<!DOCTYPE html>
<html>
<head>
  <title>College Chatbot</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .container {
      width: 420px;
      background: #1e293b;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: #0f172a;
      padding: 15px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      border-bottom: 1px solid #334155;
    }

    #chat {
      height: 400px;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      margin: 6px 0;
      border-radius: 12px;
      line-height: 1.4;
      animation: fadeIn 0.2s ease-in;
    }

    .user {
      align-self: flex-end;
      background: #38bdf8;
      color: black;
      border-bottom-right-radius: 2px;
    }

    .bot {
      align-self: flex-start;
      background: #22c55e;
      color: black;
      border-bottom-left-radius: 2px;
    }

    .typing {
      font-style: italic;
      opacity: 0.7;
    }

    .input-area {
      display: flex;
      border-top: 1px solid #334155;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    button {
      padding: 12px 16px;
      border: none;
      background: #38bdf8;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #0ea5e9;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div class="container">
  <div class="header">🎓 College Chatbot</div>

  <div id="chat"></div>

  <div class="input-area">
    <input id="input" placeholder="Ask about courses, fees..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const msg = input.value.trim();
  if (!msg) return;

  // User message
  chat.innerHTML += `<div class="msg user">${msg}</div>`;
  input.value = "";

  // Typing indicator
  const typingDiv = document.createElement("div");
  typingDiv.className = "msg bot typing";
  typingDiv.innerText = "Typing...";
  chat.appendChild(typingDiv);

  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: msg })
    });

    const data = await res.json();

    // Remove typing
    chat.removeChild(typingDiv);

    // Bot message
    chat.innerHTML += `<div class="msg bot">${data.reply}</div>`;

    chat.scrollTop = chat.scrollHeight;

  } catch (err) {
    chat.removeChild(typingDiv);
    chat.innerHTML += `<div class="msg bot">Server error</div>`;
  }
}
</script>

</body>
</html>
